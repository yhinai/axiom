#:schema https://developers.openai.com/codex/config-schema.json

approval_policy = "never"
sandbox_mode = "workspace-write"
web_search = "live"

[features]
multi_agent = true

[profiles.strict]
approval_policy = "on-request"
sandbox_mode = "read-only"
web_search = "cached"

[profiles.bench]
approval_policy = "never"
sandbox_mode = "workspace-write"
web_search = "cached"

[agents]
max_threads = 4
max_depth = 1

[agents.explorer]
description = "Read-only Helion explorer for tracing kernel paths, task shapes, and supporting evidence."
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "Read-only reviewer for correctness, regressions, missing shape coverage, and secret exposure."
config_file = "agents/reviewer.toml"

[agents.benchmarker]
description = "Helion benchmark specialist for eval.py command selection, performance deltas, and leaderboard readiness."
config_file = "agents/benchmarker.toml"
